
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preventivi Facili</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

<div class="container bg-white p-4 rounded shadow" style="max-width: 600px;">
<h2 class="text-center mb-4">Nuovo Preventivo</h2>

<div class="mb-3">
<label class="form-label">Nome Cliente</label>
<input type="text" id="cliente" class="form-control" placeholder="Es. Rossi SRL">
</div>

<hr>

<div class="mb-3">
<label class="form-label">Descrizione Servizio</label>
<input type="text" id="descrizione" class="form-control" placeholder="Es. Creazione Sito Web">
</div>

<div class="row">
<div class="col-6 mb-3">
<label class="form-label">Prezzo (€)</label>
<input type="number" id="prezzo" class="form-control" value="0" oninput="calcolaTotale()">
</div>
<div class="col-6 mb-3">
<label class="form-label">Quantità</label>
<input type="number" id="quantita" class="form-control" value="1" oninput="calcolaTotale()">
</div>
</div>

<hr>

<div class="d-flex justify-content-between align-items-center my-3">
<h4>Totale:</h4>
<h3 class="text-success">€ <span id="totale">0.00</span></h3>
</div>

<button class="btn btn-primary w-100 btn-lg" onclick="window.print()">Stampa / Salva in PDF</button>
</div>

<script>
function calcolaTotale() {
const prezzo = parseFloat(document.getElementById('prezzo').value) || 0;
const quantita = parseFloat(document.getElementById('quantita').value) || 0;
const totale = prezzo * quantita;
document.getElementById('totale').innerText = totale.toFixed(2);
}
</script>
</body>
</html>
